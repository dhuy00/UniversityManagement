services:
  postgres:
    image: postgres:16-alpine
    container_name: university-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: university_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    ports:
      - "5233:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d university_management"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
